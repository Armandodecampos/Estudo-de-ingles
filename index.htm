<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Reader - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-shimmer {
            background: linear-gradient(90deg, #3d5a4a 25%, #4a6d5a 50%, #3d5a4a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Ajustes de scroll e toque */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: #4a6d5a; border-radius: 10px; }
        
        /* Previne zoom automático em inputs no iOS */
        @media screen and (max-width: 768px) {
            input, select, textarea { font-size: 16px !important; }
        }

        /* Cor de lousa escolar customizada */
        .bg-chalkboard {
            background-color: #1b3329;
        }
    </style>
</head>
<body class="bg-chalkboard min-h-screen font-sans text-slate-900 selection:bg-emerald-200">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Controles de Voz -->
        <div class="mb-6 bg-slate-200/90 backdrop-blur-lg p-5 md:p-6 rounded-2xl border border-slate-300 shadow-2xl flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-6 md:gap-10">
            <!-- Seletor de Voz -->
            <div class="flex flex-col gap-2 flex-1">
                <label for="voice-select" class="text-[11px] font-black text-slate-600 uppercase tracking-widest px-1">Voz do Sistema</label>
                <select id="voice-select" class="bg-white border border-slate-300 text-slate-800 text-sm rounded-xl focus:ring-2 focus:ring-emerald-500 block w-full p-3.5 outline-none transition-all appearance-none cursor-pointer hover:border-emerald-400 shadow-sm">
                    <option value="" class="bg-white text-slate-800">Carregando vozes...</option>
                </select>
            </div>

            <!-- Seletor de Velocidade -->
            <div class="flex flex-col gap-2 w-full sm:w-56">
                <div class="flex justify-between items-center px-1">
                    <label for="speed-range" class="text-[11px] font-black text-slate-600 uppercase tracking-widest">Velocidade</label>
                    <span id="speed-value" class="text-sm font-bold text-white bg-emerald-700 px-3 py-0.5 rounded-full shadow-md">1.0x</span>
                </div>
                <div class="flex items-center gap-3 pt-1">
                    <input type="range" id="speed-range" min="0.1" max="1.0" step="0.1" value="1" 
                        class="w-full h-2.5 bg-slate-400 rounded-lg appearance-none cursor-pointer accent-emerald-600 transition-colors">
                </div>
                <div class="flex justify-between text-[10px] text-slate-600 font-black uppercase px-1">
                    <span>Lento</span>
                    <span>Normal</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col lg:grid lg:grid-cols-3 gap-6">
            
            <!-- Entrada de Texto -->
            <div class="lg:col-span-2 order-1">
                <div class="bg-white rounded-3xl shadow-2xl border border-emerald-900/10 overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <span class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Texto em Inglês</span>
                        <div class="flex gap-2 sm:gap-3">
                            <button id="btn-play-all" class="flex items-center gap-2 px-3 sm:px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl transition-all shadow-lg active:scale-95 text-xs sm:text-sm font-bold uppercase tracking-wider">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                OUVIR
                            </button>
                            <!-- Novo botão Traduzir adicionado -->
                            <button id="btn-translate-all" class="flex items-center gap-2 px-3 sm:px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all shadow-lg active:scale-95 text-xs sm:text-sm font-bold uppercase tracking-wider">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>
                                TRADUZIR
                            </button>
                            <button id="btn-clear" class="p-2 text-slate-400 hover:text-rose-600 active:scale-90 transition-all" title="Limpar tudo">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    <textarea id="text-input" 
                        class="w-full h-72 md:h-[500px] p-6 focus:outline-none resize-none text-base md:text-lg text-slate-800 leading-relaxed placeholder:text-slate-400"
                        placeholder="Cole aqui o conteúdo que deseja estudar..."></textarea>
                </div>
            </div>

            <!-- Tradução & Dicionário -->
            <div class="lg:col-span-1 order-2">
                <div class="bg-white rounded-3xl shadow-2xl border border-emerald-900/10 sticky top-6 mb-8 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                        <h2 class="text-xs font-black text-slate-800 flex items-center gap-2 uppercase tracking-widest">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>
                            Painel de Tradução
                        </h2>
                    </div>
                    
                    <div id="translation-content" class="p-6 min-h-[220px]">
                        <div id="empty-state" class="text-center text-slate-400 py-12">
                            <p class="text-sm font-medium italic">Selecione uma frase ou use o botão 'TRADUZIR'.</p>
                        </div>

                        <div id="result-state" class="hidden animate-in fade-in duration-300">
                            <div class="mb-5">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-black text-emerald-700 uppercase tracking-widest bg-emerald-50 px-2 py-0.5 rounded">Original</span>
                                    <button id="btn-speak-selection" class="p-2 -mt-2 -mr-2 text-emerald-600 hover:text-emerald-800 active:scale-125 transition-all bg-emerald-50 rounded-full" title="Ouvir seleção">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                    </button>
                                </div>
                                <p id="original-text" class="text-lg font-bold text-slate-900 break-words leading-tight max-h-32 overflow-y-auto"></p>
                            </div>
                            
                            <div class="p-5 bg-emerald-50/80 rounded-2xl border border-emerald-200/60 ring-1 ring-emerald-500/5">
                                <span class="text-[10px] font-black text-emerald-800 uppercase tracking-widest block mb-2 opacity-70">Tradução em Português</span>
                                <p id="translated-text" class="text-slate-800 leading-relaxed text-lg font-semibold max-h-48 overflow-y-auto"></p>
                            </div>
                        </div>

                        <div id="loading-state" class="hidden space-y-4 pt-2">
                            <div class="h-4 w-1/3 loading-shimmer rounded-full"></div>
                            <div class="h-8 w-full loading-shimmer rounded-lg"></div>
                            <div class="h-28 w-full loading-shimmer rounded-2xl"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const btnPlayAll = document.getElementById('btn-play-all');
        const btnTranslateAll = document.getElementById('btn-translate-all');
        const btnClear = document.getElementById('btn-clear');
        const btnSpeakSelection = document.getElementById('btn-speak-selection');
        const voiceSelect = document.getElementById('voice-select');
        const speedRange = document.getElementById('speed-range');
        const speedValue = document.getElementById('speed-value');
        
        const emptyState = document.getElementById('empty-state');
        const resultState = document.getElementById('result-state');
        const loadingState = document.getElementById('loading-state');
        
        const originalTextDisplay = document.getElementById('original-text');
        const translatedTextDisplay = document.getElementById('translated-text');

        let lastSelection = "";
        let voices = [];

        // --- Persistência ---

        function saveData() {
            const data = {
                text: textInput.value,
                speed: speedRange.value,
                voiceName: voiceSelect.selectedOptions[0]?.getAttribute('data-name') || ''
            };
            localStorage.setItem('english_reader_save_v3', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('english_reader_save_v3');
            if (saved) {
                const data = JSON.parse(saved);
                textInput.value = data.text || '';
                speedRange.value = data.speed || '1';
                speedValue.innerText = `${parseFloat(speedRange.value).toFixed(1)}x`;
                return data;
            }
            return null;
        }

        // --- Vozes ---

        function populateVoiceList() {
            voices = window.speechSynthesis.getVoices()
                .filter(voice => voice.lang.startsWith('en'));

            if (voices.length === 0) return;

            const savedData = loadData();
            const savedVoiceName = savedData ? savedData.voiceName : '';

            voiceSelect.innerHTML = '';
            voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name.replace('Google ', '').replace('Microsoft ', '')}`;
                option.setAttribute('data-index', i);
                option.setAttribute('data-name', voice.name);
                option.className = "bg-white text-slate-800";
                
                if (savedVoiceName && voice.name === savedVoiceName) {
                    option.selected = true;
                } else if (!savedVoiceName && (voice.name.includes('Google') || voice.name.includes('Natural'))) {
                    option.selected = true;
                }
                
                voiceSelect.appendChild(option);
            });
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = populateVoiceList;
        }
        populateVoiceList();

        speedRange.oninput = () => {
            speedValue.innerText = `${parseFloat(speedRange.value).toFixed(1)}x`;
            saveData();
        };

        voiceSelect.onchange = saveData;
        textInput.oninput = saveData;

        // --- TTS & Tradução ---

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            const selectedOption = voiceSelect.selectedOptions[0];
            if (selectedOption) {
                const voiceIndex = selectedOption.getAttribute('data-index');
                utterance.voice = voices[voiceIndex];
            }
            utterance.rate = parseFloat(speedRange.value);
            window.speechSynthesis.speak(utterance);
        }

        async function translateText(text) {
            if (!text || text.trim().length < 1) return;
            
            emptyState.classList.add('hidden');
            resultState.classList.add('hidden');
            loadingState.classList.remove('hidden');
            
            originalTextDisplay.innerText = text;

            try {
                // Limitando o texto para tradução via API gratuita para evitar erros de URL muito longa
                const textToTranslate = text.length > 500 ? text.substring(0, 500) + "..." : text;
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=en|pt-BR`;
                const response = await fetch(url);
                const data = await response.json();
                
                translatedTextDisplay.innerText = data.responseData.translatedText;
                loadingState.classList.add('hidden');
                resultState.classList.remove('hidden');
            } catch (error) {
                translatedTextDisplay.innerText = "Erro ao traduzir. Tente novamente.";
                loadingState.classList.add('hidden');
                resultState.classList.remove('hidden');
            }
        }

        // --- Mobile Selection Handler ---

        textInput.addEventListener('mouseup', handleSelection);
        textInput.addEventListener('touchend', () => {
            setTimeout(handleSelection, 150);
        });

        function handleSelection() {
            const start = textInput.selectionStart;
            const end = textInput.selectionEnd;
            const selection = textInput.value.substring(start, end).trim();
            
            if (selection && selection !== lastSelection) {
                lastSelection = selection;
                translateText(selection);
            }
        }

        btnPlayAll.onclick = () => speak(textInput.value);
        
        btnTranslateAll.onclick = () => {
            const fullText = textInput.value.trim();
            if (fullText) {
                lastSelection = fullText;
                translateText(fullText);
            }
        };

        btnSpeakSelection.onclick = () => speak(lastSelection);

        btnClear.onclick = () => {
            if(confirm("Deseja apagar todo o texto?")) {
                textInput.value = '';
                lastSelection = "";
                emptyState.classList.remove('hidden');
                resultState.classList.add('hidden');
                window.speechSynthesis.cancel();
                saveData();
            }
        };

        // Init
        loadData();
    </script>
</body>
</html>
